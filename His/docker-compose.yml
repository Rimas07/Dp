version: '3.8'

services:
  # Основное приложение HIS
  his-app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DB_CONNECTION_STRING=mongodb://mongodb:27017/his
      - ENCRYPTION_KEY=your-very-secure-encryption-key-change-this-in-production
      # ✅ ДОБАВЛЕНО: RabbitMQ URL для подключения к очереди
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - his-network
    restart: unless-stopped

  # MongoDB для хранения данных
  mongodb:
    image: mongo:7.0
    container_name: his-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=his
    volumes:
      - mongo-data:/data/db
    networks:
      - his-network
    restart: unless-stopped

  # RabbitMQ для микросервисов и аудита
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: his-rabbitmq
    ports:
      - '5672:5672'      # AMQP порт
      - '15672:15672'    # Management UI (http://localhost:15672)
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
      - RABBITMQ_DEFAULT_VHOST=/
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - his-network
    restart: unless-stopped
    # ✅ ДОБАВЛЕНО: Health check для проверки готовности RabbitMQ
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # Producer сервис (опционально)
  producer:
    build:
      context: ../producer
      dockerfile: Dockerfile
    ports:
      - '3001:3000'
    environment:
      - PORT=3000
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
    depends_on:
      - rabbitmq
    networks:
      - his-network
    restart: unless-stopped
    profiles:
      - microservices # Запускается только при указании профиля

  # Consumer сервис - обрабатывает audit события из RabbitMQ
  # ✅ ИСПРАВЛЕНО: Убран profiles - теперь запускается автоматически
  consumer:
    build:
      context: ../consumer
      dockerfile: Dockerfile
    environment:
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy  # Ждём пока RabbitMQ станет готов
    networks:
      - his-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  his-network:
    driver: bridge
